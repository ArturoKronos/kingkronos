<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGKRONOS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { 
    --bg: #0a0a0a;
    --bg2: #1a1a1a;
    --accent-teal: #00d4d4;
    --accent-yellow: #ffd700;
    --text-light: #f0f0f0;
    --text-muted: #a0a0a0;
    --border: #00d4d4;
  }
  
  html, body { 
    background: var(--bg); 
    color: var(--text-light); 
    font-family: 'Poppins', sans-serif; 
    min-height: 100vh;
    line-height: 1.6;
  }
  
  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    border-bottom: 3px solid var(--accent-teal);
    text-align: center;
    padding: 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 12px rgba(0, 212, 212, 0.1);
  }
  
  header h1 {
    font-size: clamp(24px, 6vw, 42px);
    font-weight: 700;
    color: var(--accent-yellow);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  
  header p {
    font-size: clamp(11px, 1.5vw, 14px);
    color: var(--accent-teal);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }
  
  /* ── MAIN ── */
  main {
    padding: 32px 16px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }
  
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
  }
  
  @media(min-width: 600px) {
    #grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 22px; }
  }
  
  @media(min-width: 1024px) {
    #grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
  }

  /* ── TARJETA ── */
  .card {
    display: block;
    text-decoration: none;
    background: var(--bg2);
    border: 2px solid var(--accent-teal);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
  }
  
  .card:hover {
    transform: translateY(-8px);
    border-color: var(--accent-yellow);
    box-shadow: 0 12px 24px rgba(0, 212, 212, 0.2), 0 0 20px rgba(255, 215, 0, 0.1);
  }

  /* ── IMAGEN SIMPLE ── */
  .card-img-simple {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    border-bottom: 2px solid var(--accent-teal);
  }

  /* ── CARRUSEL ── */
  .carousel-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    overflow: hidden;
    border-bottom: 2px solid var(--accent-teal);
  }
  
  .carousel-track {
    display: flex;
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .carousel-track img {
    flex-shrink: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(10, 10, 10, 0.8);
    border: 2px solid var(--accent-yellow);
    color: var(--accent-yellow);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    z-index: 10;
    transition: all 0.2s;
    pointer-events: all;
  }
  
  .carousel-btn:hover {
    background: rgba(255, 215, 0, 0.15);
    border-color: var(--accent-teal);
    color: var(--accent-teal);
  }
  
  .carousel-btn.prev { left: 8px; }
  .carousel-btn.next { right: 8px; }
  
  .carousel-dots {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 10;
  }
  
  .carousel-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transition: all 0.2s;
    border: 1px solid rgba(0, 212, 212, 0.5);
  }
  
  .carousel-dot.active {
    background: var(--accent-yellow);
    border-color: var(--accent-yellow);
    box-shadow: 0 0 6px var(--accent-yellow);
  }

  /* ── ETIQUETA ── */
  .card-label {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: clamp(12px, 2vw, 14px);
    color: var(--text-light);
    text-align: center;
    padding: 12px 8px;
    background: var(--bg2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #status {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 0.1em;
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  
  #lightbox.active { display: flex; }
  
  .lightbox-content {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
  }
  
  .lightbox-img-wrap {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 12px;
    border: 2px solid var(--accent-teal);
  }
  
  .lightbox-img { max-width: 100%; max-height: 100%; object-fit: contain; }
  
  .lightbox-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(10, 10, 10, 0.9);
    border: 2px solid var(--accent-yellow);
    color: var(--accent-yellow);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    z-index: 1001;
    transition: all 0.2s;
  }
  
  .lightbox-close:hover {
    background: rgba(255, 215, 0, 0.15);
    border-color: var(--accent-teal);
    color: var(--accent-teal);
  }
  
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(10, 10, 10, 0.85);
    border: 2px solid var(--accent-yellow);
    color: var(--accent-yellow);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    z-index: 1001;
    transition: all 0.2s;
  }
  
  .lightbox-nav:hover {
    background: rgba(255, 215, 0, 0.15);
    border-color: var(--accent-teal);
    color: var(--accent-teal);
  }
  
  .lightbox-nav.prev { left: 20px; }
  .lightbox-nav.next { right: 20px; }
  
  .lightbox-info {
    background: rgba(26, 26, 26, 0.95);
    border-top: 2px solid var(--accent-teal);
    padding: 18px;
    text-align: center;
    margin-top: 14px;
    border-radius: 8px;
  }
  
  .lightbox-info p {
    font-size: 13px;
    color: var(--text-light);
    letter-spacing: 0.05em;
    line-height: 1.8;
  }
  
  .lightbox-info a {
    color: var(--accent-yellow);
    text-decoration: none;
    font-weight: 700;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  
  .lightbox-info a:hover { color: var(--accent-teal); }

  /* ── FOOTER ── */
  footer {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    border-top: 3px solid var(--accent-teal);
    text-align: center;
    padding: 28px 16px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
  
  .footer-content { max-width: 1400px; margin: 0 auto; }
  
  .footer-text {
    margin-bottom: 16px;
    font-weight: 600;
    color: var(--accent-teal);
    text-transform: uppercase;
  }
  
  .social-icons {
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  
  .social-icons a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border: 2px solid var(--accent-teal);
    border-radius: 50%;
    color: var(--accent-teal);
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 18px;
  }
  
  .social-icons a:hover {
    background: rgba(0, 212, 212, 0.1);
    border-color: var(--accent-yellow);
    color: var(--accent-yellow);
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
  }
</style>
</head>
<body>

<header>
  <h1>KINGKRONOS</h1>
  <p>✦ Colección Exclusiva ✦</p>
</header>

<main>
  <div id="grid">
    <div id="status">Cargando artículos...</div>
  </div>
</main>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lightbox-content">
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <span class="lightbox-close" onclick="closeLightbox()">✕</span>
      <span class="lightbox-nav prev" id="lightbox-prev" onclick="prevLightbox()" style="display:none;">‹</span>
      <span class="lightbox-nav next" id="lightbox-next" onclick="nextLightbox()" style="display:none;">›</span>
    </div>
    <div class="lightbox-info">
      <p>Visita nuestras redes <a href="#" id="lightbox-link" target="_blank">AQUÍ</a></p>
    </div>
  </div>
</div>

<footer>
  <div class="footer-content">
    <div class="footer-text">Síguenos en nuestras redes</div>
    <div class="social-icons">
      <a href="https://linktr.ee/Kingkronos787" target="_blank" rel="noopener noreferrer" title="Instagram">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <circle cx="17.5" cy="6.5" r="1.5"></circle>
        </svg>
      </a>
      <a href="https://linktr.ee/Kingkronos787" target="_blank" rel="noopener noreferrer" title="Telegram">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 2l-9.5 19-1.5-4.5-4.5-1.5L21 2z"></path>
          <path d="M12 12l6-8"></path>
        </svg>
      </a>
      <a href="https://linktr.ee/Kingkronos787" target="_blank" rel="noopener noreferrer" title="TikTok">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
        </svg>
      </a>
    </div>
  </div>
</footer>

<script>
  const REPO = 'ArturoKronos/kingkronos';
  const DEFAULT_LINK = 'https://linktr.ee/Kingkronos787';

  const carouselState = {};
  let currentLightboxImages = [];
  let currentLightboxIndex = 0;
  let currentLightboxLink = DEFAULT_LINK;

  async function loadItems() {
    const grid = document.getElementById('grid');
    try {
      const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/data.json?nocache=${Date.now()}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const link = data.link || DEFAULT_LINK;
      grid.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        grid.innerHTML = '<div id="status">Próximamente...</div>';
        return;
      }
      data.items.forEach((item, idx) => {
        const isCarousel = Array.isArray(item.images) && item.images.length > 1;
        if (isCarousel) {
          grid.appendChild(buildCarouselCard(item, idx, link));
        } else {
          grid.appendChild(buildSimpleCard(item, link));
        }
      });
    } catch(e) {
      grid.innerHTML = '<div id="status">Próximamente...</div>';
    }
  }

  function imgUrl(src) {
    if (!src) return '';
    return src.startsWith('http')
      ? src
      : `https://raw.githubusercontent.com/${REPO}/main/fotos/${src}?nocache=${Date.now()}`;
  }

  function buildSimpleCard(item, link) {
    const src = item.src || (item.images && item.images[0]);
    const div = document.createElement('div');
    div.className = 'card';
    div.onclick = () => openLightbox([imgUrl(src)], link);
    div.innerHTML = `
      <img class="card-img-simple" src="${imgUrl(src)}" alt="${esc(item.title)}" loading="lazy">
      <div class="card-label">${esc(item.title)}</div>
    `;
    return div;
  }

  function buildCarouselCard(item, idx, link) {
    const cardId = `carousel-${idx}`;
    carouselState[cardId] = 0;

    const div = document.createElement('div');
    div.className = 'card';

    const imgsHtml = item.images.map(src =>
      `<img src="${imgUrl(src)}" alt="${esc(item.title)}" loading="lazy">`
    ).join('');

    const dotsHtml = item.images.map((_, i) =>
      `<span class="carousel-dot${i===0?' active':''}" data-dot="${i}"></span>`
    ).join('');

    div.innerHTML = `
      <div class="carousel-wrap">
        <div class="carousel-track" id="track-${idx}">${imgsHtml}</div>
        <button class="carousel-btn prev" data-card="${cardId}" data-dir="-1" title="Anterior">‹</button>
        <button class="carousel-btn next" data-card="${cardId}" data-dir="1" title="Siguiente">›</button>
        <div class="carousel-dots" id="dots-${idx}">${dotsHtml}</div>
      </div>
      <div class="card-label">${esc(item.title)}</div>
    `;

    const carouselWrap = div.querySelector('.carousel-wrap');
    carouselWrap.onclick = (e) => {
      if (!e.target.classList.contains('carousel-btn')) {
        openLightbox(item.images.map(imgUrl), link);
      }
    };

    div.querySelectorAll('.carousel-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        const cid = this.dataset.card;
        const dir = parseInt(this.dataset.dir);
        moveCarousel(cid, idx, item.images.length, dir);
      });
    });

    return div;
  }

  function moveCarousel(cardId, idx, total, dir) {
    let current = carouselState[cardId] || 0;
    current = (current + dir + total) % total;
    carouselState[cardId] = current;

    const track = document.getElementById(`track-${idx}`);
    if (track) track.style.transform = `translateX(-${current * 100}%)`;

    const dotsContainer = document.getElementById(`dots-${idx}`);
    if (dotsContainer) {
      dotsContainer.querySelectorAll('.carousel-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === current);
      });
    }
  }

  function openLightbox(images, link) {
    currentLightboxImages = images;
    currentLightboxIndex = 0;
    currentLightboxLink = link;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = 'auto';
  }

  function updateLightbox() {
    const img = document.getElementById('lightbox-img');
    img.src = currentLightboxImages[currentLightboxIndex];
    document.getElementById('lightbox-link').href = currentLightboxLink;

    const prevBtn = document.getElementById('lightbox-prev');
    const nextBtn = document.getElementById('lightbox-next');

    if (currentLightboxImages.length > 1) {
      prevBtn.style.display = 'flex';
      nextBtn.style.display = 'flex';
    } else {
      prevBtn.style.display = 'none';
      nextBtn.style.display = 'none';
    }
  }

  function prevLightbox() {
    currentLightboxIndex = (currentLightboxIndex - 1 + currentLightboxImages.length) % currentLightboxImages.length;
    updateLightbox();
  }

  function nextLightbox() {
    currentLightboxIndex = (currentLightboxIndex + 1) % currentLightboxImages.length;
    updateLightbox();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevLightbox();
    if (e.key === 'ArrowRight') nextLightbox();
  });

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox') closeLightbox();
  });

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadItems();
</script>
</body>
</html>
