<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGKRONOS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#1a0033; --bg2:#2a004a; --purple:#7b2cbe; --neon-pink:#ff00ff; --neon-cyan:#00ffee; --card-border:#cc00ff; }
  html, body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; }
  
  header {
    background:#000; border-bottom:3px solid var(--neon-pink);
    text-align:center; padding:18px 16px 14px; position:sticky; top:0; z-index:100;
  }
  header h1 {
    font-size:clamp(20px,5vw,40px); font-weight:900; color:var(--neon-pink);
    letter-spacing:0.15em; text-transform:uppercase; animation:pulse 3s ease-in-out infinite;
  }
  header p { font-size:clamp(9px,1.5vw,13px); color:var(--neon-cyan); letter-spacing:0.3em; margin-top:4px; text-shadow:0 0 8px var(--neon-cyan); text-transform:uppercase; }
  @keyframes pulse {
    0%,100% { text-shadow:0 0 10px #ff00ff,0 0 30px #cc00ff,0 0 60px #aa00cc; }
    50%      { text-shadow:0 0 20px #ff00ff,0 0 60px #ff00ff,0 0 100px #cc00ff; }
  }
  
  main { padding:24px 16px 40px; max-width:1400px; margin:0 auto; }
  #grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:18px; }
  @media(min-width:600px)  { #grid { grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:20px; } }
  @media(min-width:1024px) { #grid { grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:24px; } }

  /* ── TARJETA BASE ── */
  .card {
    display:block; text-decoration:none; background:var(--bg2);
    border:2px solid var(--card-border); border-radius:8px; overflow:hidden;
    transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s; cursor:pointer;
    position:relative;
  }
  .card:hover {
    transform:translateY(-5px) scale(1.02);
    box-shadow:0 0 20px #ff00ff88,0 0 40px #cc00ff44,0 8px 20px rgba(0,0,0,0.5);
    border-color:var(--neon-pink);
  }

  /* ── IMAGEN SIMPLE ── */
  .card-img-simple { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; border-bottom:2px solid var(--card-border); }

  /* ── CARRUSEL ── */
  .carousel-wrap {
    position:relative; width:100%; aspect-ratio:3/4; overflow:hidden;
    border-bottom:2px solid var(--card-border);
  }
  .carousel-track {
    display:flex; height:100%;
    transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .carousel-track img {
    flex-shrink:0; width:100%; height:100%; object-fit:cover;
  }
  .carousel-btn {
    position:absolute; top:50%; transform:translateY(-50%);
    background:rgba(10,0,25,0.75); border:1px solid var(--neon-pink);
    color:var(--neon-pink); border-radius:50%; width:28px; height:28px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:14px; z-index:10;
    transition:background 0.2s;
    pointer-events:all;
  }
  .carousel-btn:hover { background:rgba(255,0,255,0.25); }
  .carousel-btn.prev { left:6px; }
  .carousel-btn.next { right:6px; }
  .carousel-dots {
    position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
    display:flex; gap:4px; z-index:10;
  }
  .carousel-dot {
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,0.35); transition:background 0.2s;
  }
  .carousel-dot.active { background:var(--neon-pink); box-shadow:0 0 4px var(--neon-pink); }

  /* ── ETIQUETA ── */
  .card-label {
    font-family:Georgia,serif; font-style:italic; font-size:clamp(12px,2vw,14px);
    color:#fff; text-align:center; padding:10px 8px; background:var(--bg2);
    text-shadow:0 0 6px rgba(255,255,255,0.4); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  #status { grid-column:1/-1; text-align:center; padding:60px 20px; color:rgba(204,0,255,0.5); font-size:12px; letter-spacing:0.2em; }

  /* ── LIGHTBOX ── */
  #lightbox {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000;
    align-items:center; justify-content:center; padding:20px;
  }
  #lightbox.active { display:flex; }
  .lightbox-content {
    position:relative; max-width:90vw; max-height:90vh; display:flex; flex-direction:column;
  }
  .lightbox-img-wrap {
    position:relative; flex:1; display:flex; align-items:center; justify-content:center;
    overflow:hidden; border-radius:8px; border:2px solid var(--neon-pink);
  }
  .lightbox-img { max-width:100%; max-height:100%; object-fit:contain; }
  .lightbox-close {
    position:absolute; top:10px; right:10px; background:rgba(10,0,25,0.9);
    border:1px solid var(--neon-pink); color:var(--neon-pink); border-radius:50%;
    width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:18px; z-index:1001; transition:background 0.2s;
  }
  .lightbox-close:hover { background:rgba(255,0,255,0.2); }
  .lightbox-nav {
    position:absolute; top:50%; transform:translateY(-50%);
    background:rgba(10,0,25,0.85); border:1px solid var(--neon-pink);
    color:var(--neon-pink); border-radius:50%; width:36px; height:36px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:16px; z-index:1001; transition:background 0.2s;
  }
  .lightbox-nav:hover { background:rgba(255,0,255,0.25); }
  .lightbox-nav.prev { left:15px; }
  .lightbox-nav.next { right:15px; }
  .lightbox-info {
    background:rgba(10,0,25,0.9); border-top:1px solid var(--neon-pink);
    padding:16px; text-align:center; margin-top:12px; border-radius:6px;
  }
  .lightbox-info p {
    font-size:12px; color:rgba(0,255,238,0.8); letter-spacing:0.1em; line-height:1.6;
  }
  .lightbox-info a {
    color:var(--neon-pink); text-decoration:none; font-weight:700; text-transform:uppercase;
    transition:color 0.2s;
  }
  .lightbox-info a:hover { color:var(--neon-cyan); }

  /* ── FOOTER ── */
  footer {
    background:#000; border-top:2px solid var(--purple); text-align:center;
    padding:20px 16px; font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:0.15em;
  }
  .footer-content { max-width:1400px; margin:0 auto; }
  .footer-text { margin-bottom:12px; }
  .social-icons {
    display:flex; gap:16px; justify-content:center; align-items:center;
  }
  .social-icons a {
    display:inline-flex; align-items:center; justify-content:center;
    width:36px; height:36px; border:1.5px solid var(--neon-cyan);
    border-radius:50%; color:var(--neon-cyan); text-decoration:none;
    transition:all 0.2s; font-size:16px;
  }
  .social-icons a:hover {
    background:rgba(0,255,238,0.15); border-color:var(--neon-pink); color:var(--neon-pink);
    box-shadow:0 0 10px rgba(0,255,238,0.4);
  }
</style>
</head>
<body>
<header>
  <h1>KINGKRONOS</h1>
  <p>✦ colección ✦</p>
</header>
<main>
  <div id="grid">
    <div id="status">Cargando artículos...</div>
  </div>
</main>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lightbox-content">
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lightbox-img" src="" alt="">
      <span class="lightbox-close" onclick="closeLightbox()">✕</span>
      <span class="lightbox-nav prev" id="lightbox-prev" onclick="prevLightbox()" style="display:none;">‹</span>
      <span class="lightbox-nav next" id="lightbox-next" onclick="nextLightbox()" style="display:none;">›</span>
    </div>
    <div class="lightbox-info">
      <p>Visita nuestras redes <a href="#" id="lightbox-link" target="_blank">AQUÍ</a></p>
    </div>
  </div>
</div>

<footer>
  <div class="footer-content">
    <div class="footer-text">Síguenos en nuestras redes</div>
    <div class="social-icons">
      <a href="https://instagram.com/kingkronos787" target="_blank" rel="noopener noreferrer" title="Instagram">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          <circle cx="17.5" cy="6.5" r="1.5"></circle>
        </svg>
      </a>
      <a href="https://t.me/kingkronos787" target="_blank" rel="noopener noreferrer" title="Telegram">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 2l-9.5 19-1.5-4.5-4.5-1.5L21 2z"></path>
          <path d="M12 12l6-8"></path>
        </svg>
      </a>
      <a href="https://tiktok.com/@kingkronos787" target="_blank" rel="noopener noreferrer" title="TikTok">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
        </svg>
      </a>
    </div>
  </div>
</footer>

<script>
  const REPO = 'ArturoKronos/kingkronos';
  const DEFAULT_LINK = 'https://linktr.ee/Kingkronos787';

  const carouselState = {};
  let currentLightboxImages = [];
  let currentLightboxIndex = 0;
  let currentLightboxLink = DEFAULT_LINK;

  async function loadItems() {
    const grid = document.getElementById('grid');
    try {
      const res = await fetch(`https://raw.githubusercontent.com/${REPO}/main/data.json?nocache=${Date.now()}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const link = data.link || DEFAULT_LINK;
      grid.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        grid.innerHTML = '<div id="status">Próximamente...</div>';
        return;
      }
      data.items.forEach((item, idx) => {
        const isCarousel = Array.isArray(item.images) && item.images.length > 1;
        if (isCarousel) {
          grid.appendChild(buildCarouselCard(item, idx, link));
        } else {
          grid.appendChild(buildSimpleCard(item, link));
        }
      });
    } catch(e) {
      grid.innerHTML = '<div id="status">Próximamente...</div>';
    }
  }

  function imgUrl(src) {
    if (!src) return '';
    return src.startsWith('http')
      ? src
      : `https://raw.githubusercontent.com/${REPO}/main/fotos/${src}?nocache=${Date.now()}`;
  }

  function buildSimpleCard(item, link) {
    const src = item.src || (item.images && item.images[0]);
    const div = document.createElement('div');
    div.className = 'card';
    div.style.cursor = 'pointer';
    div.onclick = () => openLightbox([imgUrl(src)], link);
    div.innerHTML = `
      <img class="card-img-simple" src="${imgUrl(src)}" alt="${esc(item.title)}" loading="lazy">
      <div class="card-label">${esc(item.title)}</div>
    `;
    return div;
  }

  function buildCarouselCard(item, idx, link) {
    const cardId = `carousel-${idx}`;
    carouselState[cardId] = 0;

    const div = document.createElement('div');
    div.className = 'card';

    const imgsHtml = item.images.map(src =>
      `<img src="${imgUrl(src)}" alt="${esc(item.title)}" loading="lazy">`
    ).join('');

    const dotsHtml = item.images.map((_, i) =>
      `<span class="carousel-dot${i===0?' active':''}" data-dot="${i}"></span>`
    ).join('');

    div.innerHTML = `
      <div class="carousel-wrap">
        <div class="carousel-track" id="track-${idx}">${imgsHtml}</div>
        <button class="carousel-btn prev" data-card="${cardId}" data-dir="-1" title="Anterior">‹</button>
        <button class="carousel-btn next" data-card="${cardId}" data-dir="1" title="Siguiente">›</button>
        <div class="carousel-dots" id="dots-${idx}">${dotsHtml}</div>
      </div>
      <div class="card-label">${esc(item.title)}</div>
    `;

    const carouselWrap = div.querySelector('.carousel-wrap');
    carouselWrap.style.cursor = 'pointer';
    carouselWrap.onclick = (e) => {
      if (!e.target.classList.contains('carousel-btn')) {
        openLightbox(item.images.map(imgUrl), link);
      }
    };

    div.querySelectorAll('.carousel-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        const cid = this.dataset.card;
        const dir = parseInt(this.dataset.dir);
        moveCarousel(cid, idx, item.images.length, dir);
      });
    });

    return div;
  }

  function moveCarousel(cardId, idx, total, dir) {
    let current = carouselState[cardId] || 0;
    current = (current + dir + total) % total;
    carouselState[cardId] = current;

    const track = document.getElementById(`track-${idx}`);
    if (track) track.style.transform = `translateX(-${current * 100}%)`;

    const dotsContainer = document.getElementById(`dots-${idx}`);
    if (dotsContainer) {
      dotsContainer.querySelectorAll('.carousel-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === current);
      });
    }
  }

  function openLightbox(images, link) {
    currentLightboxImages = images;
    currentLightboxIndex = 0;
    currentLightboxLink = link;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = 'auto';
  }

  function updateLightbox() {
    const img = document.getElementById('lightbox-img');
    img.src = currentLightboxImages[currentLightboxIndex];
    document.getElementById('lightbox-link').href = currentLightboxLink;

    const prevBtn = document.getElementById('lightbox-prev');
    const nextBtn = document.getElementById('lightbox-next');

    if (currentLightboxImages.length > 1) {
      prevBtn.style.display = 'flex';
      nextBtn.style.display = 'flex';
    } else {
      prevBtn.style.display = 'none';
      nextBtn.style.display = 'none';
    }
  }

  function prevLightbox() {
    currentLightboxIndex = (currentLightboxIndex - 1 + currentLightboxImages.length) % currentLightboxImages.length;
    updateLightbox();
  }

  function nextLightbox() {
    currentLightboxIndex = (currentLightboxIndex + 1) % currentLightboxImages.length;
    updateLightbox();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevLightbox();
    if (e.key === 'ArrowRight') nextLightbox();
  });

  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox') closeLightbox();
  });

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadItems();
</script>
</body>
</html>
